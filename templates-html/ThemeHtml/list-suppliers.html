<div class="content-page">
     <div class="container-fluid">
         <div class="row">
             <div class="col-lg-12">
                 <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
                     <div>
                         <h4 class="mb-3">Supplier List</h4>
                         <p class="mb-0">A supplier dashboard lets you easily gather and visualize supplier data for optimizing <br>
                          the inventory experience, ensuring smooth operations. </p>
                     </div>
                 </div>
             </div>
             <div class="col-lg-12">
                 <div class="table-responsive rounded mb-3">
                 <table class="data-table table mb-0 tbl-server-info">
                     <thead class="bg-white text-uppercase">
                         <tr class="ligth ligth-data">
                             <th>Company Name</th>
                             <th>Name</th>
                             <th>Email</th>
                             <th>Phone No.</th>
                             <th>City</th>
                             <th>Country</th>
                             <th>GST Number</th>
                             <th>Action</th>
                         </tr>
                     </thead>
                     <tbody class="ligth-body">
                     </tbody>
                 </table>
                 </div>
             </div>
         </div>
         <!-- Page end  -->
     </div>

    <!-- Edit Supplier Modal -->
    <div class="modal fade" id="edit-supplier-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-weight: 600;">Edit Supplier</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form action="" method="POST">
                    <input type="hidden" name="action_type" value="edit_supplier">
                    <input type="hidden" name="supplier_id" id="edit_supplier_id">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Company Name *</label>
                                    <input type="text" name="company_name" id="edit_supplier_company_name" class="form-control" required placeholder="Enter Company Name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Supplier Name *</label>
                                    <input type="text" name="name" id="edit_supplier_name" class="form-control" required placeholder="Enter Supplier Name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Email Address *</label>
                                    <input type="email" name="email" id="edit_supplier_email" class="form-control" required placeholder="Enter Email Address">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Phone Number *</label>
                                    <input type="text" name="phone_number" id="edit_supplier_phone" class="form-control" required placeholder="Enter Phone Number">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">GST Number *</label>
                                    <input type="text" name="gst_number" id="edit_supplier_gst" class="form-control" required placeholder="Enter GST Number">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Country *</label>
                                    <input type="text" name="country" id="edit_supplier_country" class="form-control" required placeholder="Enter Country">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">City *</label>
                                    <input type="text" name="city" id="edit_supplier_city" class="form-control" required placeholder="Enter City">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">State *</label>
                                    <input type="text" name="state" id="edit_supplier_state" class="form-control" required placeholder="Enter State">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Address *</label>
                                    <textarea name="address" id="edit_supplier_address" class="form-control" rows="3" required placeholder="Enter Address"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.openEditSupplierModal = function(suppId) {
                if (!window.currentIsAdmin) {
                    alert('This action is only allowed for administrator.');
                    return;
                }
                var supp = null;
                if (window.supplierList) {
                    for (var i = 0; i < window.supplierList.length; i++) {
                        if (window.supplierList[i].id == suppId) {
                            supp = window.supplierList[i];
                            break;
                        }
                    }
                }

                if (!supp) return;

                document.getElementById('edit_supplier_id').value = supp.id;
                document.getElementById('edit_supplier_company_name').value = supp.company_name || '';
                document.getElementById('edit_supplier_name').value = supp.name || '';
                document.getElementById('edit_supplier_email').value = supp.email || '';
                document.getElementById('edit_supplier_phone').value = supp.phone_number || '';
                document.getElementById('edit_supplier_gst').value = supp.gst_number || '';
                document.getElementById('edit_supplier_country').value = supp.country || '';
                document.getElementById('edit_supplier_city').value = supp.city || '';
                document.getElementById('edit_supplier_state').value = supp.state || '';
                document.getElementById('edit_supplier_address').value = supp.address || '';

                $('#edit-supplier-modal').modal('show');
            };
        });
    </script>

</div>
