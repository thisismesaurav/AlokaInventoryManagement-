<div class="content-page">
     <div class="container-fluid add-form-list">
        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">Add Users</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <form action="" method="POST" data-toggle="validator" enctype="multipart/form-data">
                            <input type="hidden" name="action_type" value="add_employee">
                            <div class="row"> 
                                <div class="col-md-6">                      
                                    <div class="form-group">
                                        <label>Name *</label>
                                        <input type="text" name="name" class="form-control" placeholder="Enter Name" required>
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div>    
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Phone Number</label>
                                        <input type="text" name="phone" class="form-control" placeholder="Enter Phone No">
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div> 
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>Email</label>
                                        <input type="text" name="email" class="form-control" placeholder="Enter Email">
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div> 
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>Gender</label>
                                        <select name="gender" id="gender_select" class="selectpicker form-control" data-style="py-0">
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                        </select>
                                    </div>
                                </div> 

                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>Role/Position *</label>
                                        <input type="text" name="company" class="form-control" placeholder="Enter Role/Position" required>
                                        <div class="help-block with-errors"></div>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>Status *</label>
                                        <select name="status" class="selectpicker form-control" data-style="py-0">
                                            <option>Active</option>
                                            <option>Inactive</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>Address</label>
                                        <textarea name="address" class="form-control" rows="3" placeholder="Enter Address"></textarea>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Proof Type</label>
                                        <select id="proof_type" class="form-control">
                                            <option value="">Select Proof Type...</option>
                                            <option value="id_proof">ID Proof</option>
                                            <option value="address_proof">Address Proof</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6" id="id_proof_container" style="display:none;">
                                    <div class="form-group">
                                        <label>Upload ID Proof</label>
                                        <input type="file" name="id_proof_document" class="form-control-file">
                                    </div>
                                </div>
                                <div class="col-md-6" id="address_proof_container" style="display:none;">
                                    <div class="form-group">
                                        <label>Upload Address Proof</label>
                                        <input type="file" name="address_proof_document" class="form-control-file">
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label>Employee Image</label>
                                        <div class="mb-3">
                                            <img id="profile_preview" src="../assets/images/user/1.jpg" class="img-fluid rounded avatar-100" style="max-width: 100px;" alt="profile image">
                                        </div>
                                        <input type="file" id="image_upload" class="form-control-file" accept="image/*">
                                        <input type="hidden" name="cropped_image" id="cropped_image">
                                    </div>
                                    <div id="cropper-wrapper" style="display:none; width: 100%; max-width: 400px; height: 300px; margin-bottom: 20px;">
                                        <img id="cropper-image" src="" style="max-width: 100%;">
                                    </div>
                                </div>

                            </div>                            
                            <button type="submit" class="btn btn-primary mr-2">Add Employee</button>
                            <button type="reset" class="btn btn-danger">Reset</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- Page end  -->
    </div>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <script>
        const maleImgUrl = "../assets/images/user/1.jpg";
        const femaleImgUrl = "../assets/images/user/11.png";
        const profilePreview = document.getElementById('profile_preview');
        const genderSelect = document.getElementById('gender_select');
        let customImageUploaded = false;

        genderSelect.addEventListener('change', function() {
            if(!customImageUploaded) {
                profilePreview.src = this.value === 'Female' ? femaleImgUrl : maleImgUrl;
            }
        });

        document.getElementById('proof_type').addEventListener('change', function() {
            document.getElementById('id_proof_container').style.display = 'none';
            document.getElementById('address_proof_container').style.display = 'none';
            
            if(this.value === 'id_proof') {
                document.getElementById('id_proof_container').style.display = 'block';
            } else if(this.value === 'address_proof') {
                document.getElementById('address_proof_container').style.display = 'block';
            }
        });

        let cropper;
        const imageUpload = document.getElementById('image_upload');
        const cropperImage = document.getElementById('cropper-image');
        const cropperWrapper = document.getElementById('cropper-wrapper');
        const croppedImageInput = document.getElementById('cropped_image');

        imageUpload.addEventListener('change', function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cropperImage.src = event.target.result;
                    cropperWrapper.style.display = 'block';
                    if (cropper) {
                        cropper.destroy();
                    }
                    cropper = new Cropper(cropperImage, {
                        aspectRatio: 1,
                        viewMode: 1,
                        crop: function() {
                            const canvas = cropper.getCroppedCanvas({
                                width: 256,
                                height: 256
                            });
                            if(canvas) {
                                const dataUrl = canvas.toDataURL('image/png');
                                croppedImageInput.value = dataUrl;
                                profilePreview.src = dataUrl;
                                customImageUploaded = true;
                            }
                        }
                    });
                };
                reader.readAsDataURL(files[0]);
            }
        });
    </script>

      </div>
