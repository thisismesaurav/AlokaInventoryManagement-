<div class="content-page">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
                    <div>
                        <h4 class="mb-3">Category List</h4>
                    </div>
                    <a href="add-category.html" class="btn btn-primary add-list"><i class="las la-plus mr-3"></i>Add Category</a>
                </div>
            </div>
            <div class="col-lg-12">
                <div class="table-responsive rounded mb-3">
                    <table class="data-table table mb-0 tbl-server-info">
                        <thead class="bg-white text-uppercase">
                            <tr class="ligth ligth-data">
                                <th>Image</th>
                                <th>Code</th>
                                <th>Category</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody class="ligth-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <!-- Page end  -->
    </div>

    <!-- Edit Category Modal -->
    <div class="modal fade" id="edit-category-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-weight: 600;">Edit Category</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form action="" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="action_type" value="edit_category">
                    <input type="hidden" name="category_id" id="edit_category_id">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Category Name *</label>
                                    <input type="text" name="category_name" id="edit_category_name" class="form-control" required placeholder="Enter Category Name">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Category Code *</label>
                                    <input type="text" name="category_code" id="edit_category_code" class="form-control" required placeholder="Enter Category Code">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Category Image</label>
                                    <input type="file" name="pic" class="form-control-file">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.openEditCategoryModal = function(catId) {
                if (!window.currentIsAdmin) {
                    alert('This action is only allowed for administrator.');
                    return;
                }
                var cat = null;
                if (window.categoryList) {
                    for (var i = 0; i < window.categoryList.length; i++) {
                        if (window.categoryList[i].id == catId) {
                            cat = window.categoryList[i];
                            break;
                        }
                    }
                }

                if (!cat) return;

                document.getElementById('edit_category_id').value = cat.id;
                document.getElementById('edit_category_name').value = cat.name;
                document.getElementById('edit_category_code').value = cat.code;

                $('#edit-category-modal').modal('show');
            };
        });
    </script>

</div>
