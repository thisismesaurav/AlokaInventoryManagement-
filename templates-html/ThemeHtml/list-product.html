<div class="content-page">
     <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="d-flex flex-wrap flex-wrap align-items-center justify-content-between mb-4">
                    <div>
                        <h4 class="mb-3">Product List</h4>
                        <p class="mb-0">The product list effectively dictates product presentation and provides space<br> to list your products and offering in the most appealing way.</p>
                    </div>
                    <a href="add-product.html" class="btn btn-primary add-list"><i class="las la-plus mr-3"></i>Add Product</a>
                </div>
            </div>
            <div class="col-lg-12 mb-3">
                <div class="card mb-0">
                    <div class="card-body py-3">
                        <div class="row align-items-center">
                            <div class="col-md-3 col-sm-6">
                                <div class="form-group mb-0">
                                    <label class="font-weight-bold" style="font-size:12px; color:#475569;">Filter by Product Type</label>
                                    <select id="filter-product-type" class="form-control" style="font-size:13px; height: 38px;">
                                        <option value="">All Product Types</option>
                                        <!-- DYNAMIC_TYPE_OPTIONS -->
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-6">
                                <div class="form-group mb-0">
                                    <label class="font-weight-bold" style="font-size:12px; color:#475569;">Filter by Category</label>
                                    <select id="filter-category" class="form-control" style="font-size:13px; height: 38px;">
                                        <option value="">All Categories</option>
                                        <!-- DYNAMIC_CATEGORY_OPTIONS -->
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <div class="table-responsive rounded mb-3">
                <table class="data-tables table mb-0 tbl-server-info">
                     <thead class="bg-white text-uppercase">
                        <tr class="ligth ligth-data">
                            <th>Product Number</th>
                            <th>Product Type</th>
                            <th>Category</th>
                            <th>Product</th>
                            <th>Cost</th>
                            <th>Code</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody class="ligth-body">
                    </tbody>
                </table>
                </div>
            </div>
        </div>
        <!-- Page end  -->
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="edit-product-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-weight: 600;">Edit Product</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form action="" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="action_type" value="edit_product">
                    <input type="hidden" name="product_id" id="edit_product_id">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Product Type *</label>
                                    <select name="product_type" id="edit_product_type" class="form-control" required>
                                        <!-- EDIT_TYPE_OPTIONS -->
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Name *</label>
                                    <input type="text" name="product_name" id="edit_product_name" class="form-control" required placeholder="Enter Product Name">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Code *</label>
                                    <input type="text" name="product_code" id="edit_product_code" class="form-control" required placeholder="Enter Product Code">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Category *</label>
                                    <select name="category" id="edit_category" class="form-control" required>
                                        <!-- EDIT_CATEGORY_OPTIONS -->
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Cost *</label>
                                    <input type="number" step="0.01" name="cost" id="edit_cost" class="form-control" required placeholder="Enter Product Cost">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Product Image</label>
                                    <input type="file" name="pic" class="form-control-file">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Description / Product Details</label>
                                    <textarea name="description" id="edit_description" class="form-control" rows="3"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.openEditProductModal = function(productId) {
                if (!window.currentIsAdmin) {
                    alert('This action is only allowed for administrator.');
                    return;
                }
                var prod = null;
                if (window.productList) {
                    for (var i = 0; i < window.productList.length; i++) {
                        if (window.productList[i].id == productId) {
                            prod = window.productList[i];
                            break;
                        }
                    }
                }

                if (!prod) return;

                document.getElementById('edit_product_id').value = prod.id;
                document.getElementById('edit_product_type').value = prod.product_type;
                document.getElementById('edit_product_name').value = prod.product_name;
                document.getElementById('edit_product_code').value = prod.product_code;
                document.getElementById('edit_category').value = prod.category;
                document.getElementById('edit_cost').value = prod.cost;
                document.getElementById('edit_description').value = prod.description || '';

                $('#edit-product-modal').modal('show');
            };

            jQuery(document).ready(function($) {
                var table = $('.data-tables').DataTable();

                $('#filter-product-type').on('change', function() {
                    var val = $(this).val();
                    table.column(1).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
                });

                $('#filter-category').on('change', function() {
                    var val = $(this).val();
                    table.column(2).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
                });
            });
        });
    </script>

</div>
