<div class="content-page">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
                    <div>
                        <h4 class="mb-3">Employee List</h4>
                    </div>
                </div>
            </div>
            <div class="col-lg-12">
                <div class="table-responsive rounded mb-3">
                    <table class="data-table table mb-0 tbl-server-info">
                        <thead class="bg-white text-uppercase">
                            <tr class="ligth ligth-data">
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role/Position</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody class="ligth-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <!-- Page end  -->
    </div>
    
    <!-- Modal Edit User -->
    <div class="modal fade" id="edit-user-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title text-white" id="editUserModalLabel"><i class="las la-edit mr-2"></i>Edit User</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="edit-user-form" action="" method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="action_type" value="edit_employee">
                        <input type="hidden" name="employee_id" id="edit_employee_id">
                        <div class="row"> 
                            <div class="col-md-6">                      
                                <div class="form-group">
                                    <label>Name *</label>
                                    <input type="text" name="name" id="edit_name" class="form-control" placeholder="Enter Name" required>
                                </div>
                            </div>    
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Phone Number</label>
                                    <input type="text" name="phone" id="edit_phone" class="form-control" placeholder="Enter Phone No">
                                </div>
                            </div> 
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" name="email" id="edit_email" class="form-control" placeholder="Enter Email">
                                </div>
                            </div> 
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Gender</label>
                                    <select name="gender" id="edit_gender_select" class="form-control">
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                            </div> 
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Role/Position *</label>
                                    <input type="text" name="company" id="edit_company" class="form-control" placeholder="Enter Role/Position" required>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Status *</label>
                                    <select name="status" id="edit_status" class="form-control">
                                        <option value="Active">Active</option>
                                        <option value="Inactive">Inactive</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Address</label>
                                    <textarea name="address" id="edit_address" class="form-control" rows="3" placeholder="Enter Address"></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Proof Type</label>
                                    <select id="edit_proof_type" class="form-control">
                                        <option value="">Select Proof Type...</option>
                                        <option value="id_proof">ID Proof</option>
                                        <option value="address_proof">Address Proof</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6" id="edit_id_proof_container" style="display:none;">
                                <div class="form-group">
                                    <label>Upload ID Proof</label>
                                    <div id="edit_existing_id_proof" class="mb-2"></div>
                                    <input type="file" name="id_proof_document" class="form-control-file">
                                </div>
                            </div>
                            <div class="col-md-6" id="edit_address_proof_container" style="display:none;">
                                <div class="form-group">
                                    <label>Upload Address Proof</label>
                                    <div id="edit_existing_address_proof" class="mb-2"></div>
                                    <input type="file" name="address_proof_document" class="form-control-file">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Employee Image</label>
                                    <div class="mb-3">
                                        <img id="edit_profile_preview" src="" class="img-fluid rounded avatar-100" style="max-width: 100px;" alt="profile image">
                                    </div>
                                    <input type="file" id="edit_image_upload" class="form-control-file" accept="image/*">
                                    <input type="hidden" name="cropped_image" id="edit_cropped_image">
                                </div>
                                <div id="edit_cropper_wrapper" style="display:none; width: 100%; max-width: 400px; height: 300px; margin-bottom: 20px;">
                                    <img id="edit_cropper_image" src="" style="max-width: 100%;">
                                </div>
                            </div>
                        </div>                            
                        <div class="d-flex justify-content-end mt-3">
                            <button type="button" class="btn btn-secondary mr-2" data-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- CropperJS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var editModal = $('#edit-user-modal');

            // Handle edit button click via row action
            window.openEditUserModal = function(empId) {
                if (!window.currentIsAdmin) {
                    alert('This action is only allowed for administrator.');
                    return;
                }
                var emp = null;
                if (window.employeeList) {
                    for (var i = 0; i < window.employeeList.length; i++) {
                        if (window.employeeList[i].id == empId) {
                            emp = window.employeeList[i];
                            break;
                        }
                    }
                }

                if (!emp) {
                    alert('User details could not be found.');
                    return;
                }

                // Pre-populate fields
                document.getElementById('edit_employee_id').value = emp.id;
                document.getElementById('edit_name').value = emp.name;
                document.getElementById('edit_phone').value = emp.phone;
                document.getElementById('edit_email').value = emp.email;
                document.getElementById('edit_gender_select').value = emp.gender;
                document.getElementById('edit_company').value = emp.company;
                document.getElementById('edit_status').value = emp.status;
                document.getElementById('edit_address').value = emp.address;

                // Reset proof uploads and preview links
                document.getElementById('edit_proof_type').value = '';
                document.getElementById('edit_id_proof_container').style.display = 'none';
                document.getElementById('edit_address_proof_container').style.display = 'none';
                document.getElementById('edit_existing_id_proof').innerHTML = '';
                document.getElementById('edit_existing_address_proof').innerHTML = '';

                if (emp.id_proof_document) {
                    document.getElementById('edit_existing_id_proof').innerHTML = 
                        '<a href="' + emp.id_proof_document + '" target="_blank" class="btn btn-sm btn-outline-info"><i class="las la-eye"></i> View Current ID Proof</a>';
                }
                if (emp.address_proof_document) {
                    document.getElementById('edit_existing_address_proof').innerHTML = 
                        '<a href="' + emp.address_proof_document + '" target="_blank" class="btn btn-sm btn-outline-info"><i class="las la-eye"></i> View Current Address Proof</a>';
                }

                // Reset image previews and input
                document.getElementById('edit_image_upload').value = '';
                document.getElementById('edit_cropped_image').value = '';
                document.getElementById('edit_cropper_wrapper').style.display = 'none';
                if (editCropper) {
                    editCropper.destroy();
                    editCropper = null;
                }

                var themeUri = window.themeUri || '';
                var defaultImg = (emp.gender === 'Female') ? '/assets/images/user/11.png' : '/assets/images/user/1.jpg';
                var profileImg = emp.image ? emp.image : (themeUri + defaultImg);
                document.getElementById('edit_profile_preview').src = profileImg;

                editModal.modal('show');
            };

            // Handle gender change to update default profile preview if no custom image is selected
            var editGenderSelect = document.getElementById('edit_gender_select');
            if (editGenderSelect) {
                editGenderSelect.addEventListener('change', function() {
                    var isCustomImage = document.getElementById('edit_cropped_image').value !== '';
                    if (!isCustomImage) {
                        var themeUri = window.themeUri || '';
                        var isFemale = this.value === 'Female';
                        document.getElementById('edit_profile_preview').src = themeUri + (isFemale ? '/assets/images/user/11.png' : '/assets/images/user/1.jpg');
                    }
                });
            }

            // Handle Proof Type selection change
            var editProofType = document.getElementById('edit_proof_type');
            if (editProofType) {
                editProofType.addEventListener('change', function() {
                    document.getElementById('edit_id_proof_container').style.display = 'none';
                    document.getElementById('edit_address_proof_container').style.display = 'none';
                    
                    if (this.value === 'id_proof') {
                        document.getElementById('edit_id_proof_container').style.display = 'block';
                    } else if (this.value === 'address_proof') {
                        document.getElementById('edit_address_proof_container').style.display = 'block';
                    }
                });
            }

            // Setup CropperJS for user profile image in the edit modal
            var editCropper = null;
            var editImageUpload = document.getElementById('edit_image_upload');
            var editCropperImage = document.getElementById('edit_cropper_image');
            var editCropperWrapper = document.getElementById('edit_cropper_wrapper');
            var editCroppedImageInput = document.getElementById('edit_cropped_image');
            var editProfilePreview = document.getElementById('edit_profile_preview');

            if (editImageUpload) {
                editImageUpload.addEventListener('change', function(e) {
                    var files = e.target.files;
                    if (files && files.length > 0) {
                        var reader = new FileReader();
                        reader.onload = function(event) {
                            editCropperImage.src = event.target.result;
                            editCropperWrapper.style.display = 'block';
                            if (editCropper) {
                                editCropper.destroy();
                            }
                            editCropper = new Cropper(editCropperImage, {
                                aspectRatio: 1,
                                viewMode: 1,
                                crop: function() {
                                    var canvas = editCropper.getCroppedCanvas({
                                        width: 256,
                                        height: 256
                                    });
                                    if (canvas) {
                                        var dataUrl = canvas.toDataURL('image/png');
                                        editCroppedImageInput.value = dataUrl;
                                        editProfilePreview.src = dataUrl;
                                    }
                                }
                            });
                        };
                        reader.readAsDataURL(files[0]);
                    }
                });
            }
        });
    </script>
</div>
