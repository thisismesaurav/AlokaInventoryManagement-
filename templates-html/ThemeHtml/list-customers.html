<div class="content-page">
     <div class="container-fluid">
         <div class="row">
             <div class="col-lg-12">
                 <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
                     <div>
                         <h4 class="mb-3">Customer List</h4>
                         <p class="mb-0">A customer dashboard lets you easily gather and visualize customer data from optimizing <br>
                          the customer experience, ensuring customer retention. </p>
                     </div>
                 </div>
             </div>
             <div class="col-lg-12">
                 <div class="table-responsive rounded mb-3">
                 <table class="data-table table mb-0 tbl-server-info">
                     <thead class="bg-white text-uppercase">
                         <tr class="ligth ligth-data">
                             <th>Company Name</th>
                             <th>Name</th>
                             <th>Email</th>
                             <th>Phone No.</th>
                             <th>Country</th>
                             <th>Order</th>
                             <th>Status</th>
                             <th>Last Order</th>
                             <th>Action</th>
                         </tr>
                     </thead>
                     <tbody class="ligth-body">
                     </tbody>
                 </table>
                 </div>
             </div>
         </div>
         <!-- Page end  -->
     </div>

    <!-- Edit Customer Modal -->
    <div class="modal fade" id="edit-customer-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-weight: 600;">Edit Customer</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form action="" method="POST">
                    <input type="hidden" name="action_type" value="edit_customer">
                    <input type="hidden" name="customer_id" id="edit_customer_id">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Company Name *</label>
                                    <input type="text" name="company_name" id="edit_customer_company_name" class="form-control" required placeholder="Enter Company Name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Customer Name *</label>
                                    <input type="text" name="name" id="edit_customer_name" class="form-control" required placeholder="Enter Customer Name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Email Address *</label>
                                    <input type="email" name="email" id="edit_customer_email" class="form-control" required placeholder="Enter Email Address">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Phone Number *</label>
                                    <input type="text" name="phone_number" id="edit_customer_phone" class="form-control" required placeholder="Enter Phone Number">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Country *</label>
                                    <input type="text" name="country" id="edit_customer_country" class="form-control" required placeholder="Enter Country">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">City *</label>
                                    <input type="text" name="city" id="edit_customer_city" class="form-control" required placeholder="Enter City">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">State *</label>
                                    <input type="text" name="state" id="edit_customer_state" class="form-control" required placeholder="Enter State">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Customer Group *</label>
                                    <select name="customer_group" id="edit_customer_group" class="form-control" required>
                                        <option value="Retail">Retail</option>
                                        <option value="Wholesale">Wholesale</option>
                                        <option value="Distributor">Distributor</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Status *</label>
                                    <select name="status" id="edit_customer_status" class="form-control" required>
                                        <option value="Active">Active</option>
                                        <option value="Inactive">Inactive</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Address *</label>
                                    <textarea name="address" id="edit_customer_address" class="form-control" rows="3" required placeholder="Enter Address"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.openEditCustomerModal = function(custId) {
                if (!window.currentIsAdmin) {
                    alert('This action is only allowed for administrator.');
                    return;
                }
                var cust = null;
                if (window.customerList) {
                    for (var i = 0; i < window.customerList.length; i++) {
                        if (window.customerList[i].id == custId) {
                            cust = window.customerList[i];
                            break;
                        }
                    }
                }

                if (!cust) return;

                document.getElementById('edit_customer_id').value = cust.id;
                document.getElementById('edit_customer_company_name').value = cust.company_name || '';
                document.getElementById('edit_customer_name').value = cust.name || '';
                document.getElementById('edit_customer_email').value = cust.email || '';
                document.getElementById('edit_customer_phone').value = cust.phone_number || '';
                document.getElementById('edit_customer_country').value = cust.country || '';
                document.getElementById('edit_customer_city').value = cust.city || '';
                document.getElementById('edit_customer_state').value = cust.state || '';
                document.getElementById('edit_customer_group').value = cust.customer_group || 'Retail';
                document.getElementById('edit_customer_status').value = cust.status || 'Active';
                document.getElementById('edit_customer_address').value = cust.address || '';

                $('#edit-customer-modal').modal('show');
            };
        });
    </script>

</div>
