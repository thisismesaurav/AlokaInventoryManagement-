<div class="content-page">
   <div class="container-fluid">
      <div class="row">
         <div class="col-lg-12">
            <div class="card car-transparent">
               <div class="card-body p-0">
                  <div class="profile-image position-relative">
                     <img src="../assets/images/page-img/profile.png" class="img-fluid rounded w-100" alt="profile-image" style="max-height: 250px; object-fit: cover;">
                  </div>
               </div>
            </div>
         </div>
      </div>
      <div class="row">
         <!-- PROFILE_ALERT -->
      </div>
      <div class="row m-sm-0 px-3">            
         <!-- Sidebar Profile Card -->
         <div class="col-lg-4 card-profile">
            <div class="card card-block card-stretch card-height">
               <div class="card-body">
                  <div class="d-flex align-items-center mb-3">
                     <div class="profile-img position-relative">
                        <img src="<!-- USER_AVATAR -->" class="img-fluid rounded avatar-110" alt="profile-image" style="width: 110px; height: 110px; object-fit: cover;">
                     </div>
                     <div class="ml-3">
                        <h4 class="mb-1"><!-- DISPLAY_NAME --></h4>
                        <p class="mb-0 text-muted"><!-- USER_ROLE --></p>
                     </div>
                  </div>
                  <p class="mb-4 text-secondary font-italic" style="min-height: 40px; font-size: 14px; line-height: 1.5;">
                     <!-- USER_DESCRIPTION_SHORT -->
                  </p>
                  <ul class="list-inline p-0 m-0">
                     <li class="mb-3">
                        <div class="d-flex align-items-center">
                           <div class="profile-icon-wrap mr-3 text-primary">
                              <svg class="svg-icon" height="20" width="20" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                              </svg>
                           </div>
                           <div>
                              <span class="text-muted d-block font-size-12">Email Address</span>
                              <span class="text-dark font-weight-bold" style="word-break: break-all;"><!-- USER_EMAIL --></span>
                           </div>
                        </div>
                     </li>
                     <li class="mb-3">
                        <div class="d-flex align-items-center">
                           <div class="profile-icon-wrap mr-3 text-info">
                              <svg class="svg-icon" height="20" width="20" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                              </svg>
                           </div>
                           <div>
                              <span class="text-muted d-block font-size-12">Website</span>
                              <span class="text-dark font-weight-bold" style="word-break: break-all;"><!-- USER_URL --></span>
                           </div>
                        </div>
                     </li>
                     <li>
                        <div class="d-flex align-items-center">
                           <div class="profile-icon-wrap mr-3 text-success">
                              <svg class="svg-icon" height="20" width="20" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                              </svg>
                           </div>
                           <div>
                              <span class="text-muted d-block font-size-12">Member Since</span>
                              <span class="text-dark font-weight-bold"><!-- USER_REGISTERED --></span>
                           </div>
                        </div>
                     </li>
                  </ul>
               </div>
            </div>
         </div>

         <!-- Main Profile Information Card -->
         <div class="col-lg-8 card-profile">
            <div class="card card-block card-stretch card-height">
               <div class="card-header d-flex justify-content-between align-items-center">
                  <div class="header-title">
                     <h4 class="card-title">Profile details</h4>
                  </div>
                  <div>
                     <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#edit-profile-modal">
                        <i class="ri-pencil-line mr-1"></i>Edit Profile
                     </button>
                  </div>
               </div>
               <div class="card-body">
                  <div class="row">
                     <!-- Username -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Username</span>
                           <h5 class="text-dark mb-0"><!-- USER_LOGIN --></h5>
                        </div>
                     </div>
                     <!-- Display Name -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Display Name</span>
                           <h5 class="text-dark mb-0"><!-- DISPLAY_NAME --></h5>
                        </div>
                     </div>
                     <!-- First Name -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">First Name</span>
                           <h5 class="text-dark mb-0"><!-- FIRST_NAME --></h5>
                        </div>
                     </div>
                     <!-- Last Name -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Last Name</span>
                           <h5 class="text-dark mb-0"><!-- LAST_NAME --></h5>
                        </div>
                     </div>
                     <!-- Nickname -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Nickname</span>
                           <h5 class="text-dark mb-0"><!-- NICKNAME --></h5>
                        </div>
                     </div>
                     <!-- Email -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Email Address</span>
                           <h5 class="text-dark mb-0"><!-- USER_EMAIL --></h5>
                        </div>
                     </div>
                     <!-- Website -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Website</span>
                           <h5 class="text-dark mb-0"><!-- USER_URL --></h5>
                        </div>
                     </div>
                     <!-- Registered Date -->
                     <div class="col-md-6 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 80px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Registration Date</span>
                           <h5 class="text-dark mb-0"><!-- USER_REGISTERED --></h5>
                        </div>
                     </div>
                     <!-- Biographical Info -->
                     <div class="col-12 mb-4">
                        <div class="profile-field-box p-3 bg-light rounded" style="min-height: 120px;">
                           <span class="text-muted d-block mb-1 font-size-12 text-uppercase font-weight-bold">Biographical Info</span>
                           <p class="text-dark mb-0 font-size-14" style="white-space: pre-wrap; line-height: 1.6;"><!-- USER_DESCRIPTION --></p>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="edit-profile-modal" tabindex="-1" role="dialog" aria-hidden="true">
   <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
      <div class="modal-content border-0 shadow-lg">
         <div class="modal-header border-bottom-0">
            <h5 class="modal-title font-weight-bold text-dark">Edit Profile Details</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
               <span aria-hidden="true">&times;</span>
            </button>
         </div>
         <form action="" method="POST">
            <input type="hidden" name="action_type" value="edit_profile">
            <div class="modal-body pt-0">
               <div class="row">
                  <!-- First Name -->
                  <div class="col-md-6 mb-3">
                     <label for="profile_first_name" class="font-weight-bold text-secondary font-size-13">First Name</label>
                     <input type="text" class="form-control" id="profile_first_name" name="first_name" value="<!-- FIRST_NAME -->">
                  </div>
                  <!-- Last Name -->
                  <div class="col-md-6 mb-3">
                     <label for="profile_last_name" class="font-weight-bold text-secondary font-size-13">Last Name</label>
                     <input type="text" class="form-control" id="profile_last_name" name="last_name" value="<!-- LAST_NAME -->">
                  </div>
                  <!-- Nickname -->
                  <div class="col-md-6 mb-3">
                     <label for="profile_nickname" class="font-weight-bold text-secondary font-size-13">Nickname <span class="text-danger">*</span></label>
                     <input type="text" class="form-control" id="profile_nickname" name="nickname" value="<!-- NICKNAME -->" required>
                  </div>
                  <!-- Display Name Selection or Free Text -->
                  <div class="col-md-6 mb-3">
                     <label for="profile_display_name" class="font-weight-bold text-secondary font-size-13">Display Name</label>
                     <input type="text" class="form-control" id="profile_display_name" name="display_name" value="<!-- DISPLAY_NAME -->">
                  </div>
                  <!-- Email Address -->
                  <div class="col-md-6 mb-3">
                     <label for="profile_email" class="font-weight-bold text-secondary font-size-13">Email Address <span class="text-danger">*</span></label>
                     <input type="email" class="form-control" id="profile_email" name="email" value="<!-- USER_EMAIL -->" required>
                  </div>
                  <!-- Website -->
                  <div class="col-md-6 mb-3">
                     <label for="profile_website" class="font-weight-bold text-secondary font-size-13">Website</label>
                     <input type="url" class="form-control" id="profile_website" name="website" value="<!-- USER_URL -->">
                  </div>
                  <!-- Biographical Info -->
                  <div class="col-12 mb-3">
                     <label for="profile_description" class="font-weight-bold text-secondary font-size-13">Biographical Info</label>
                     <textarea class="form-control" id="profile_description" name="description" rows="4"><!-- USER_DESCRIPTION --></textarea>
                  </div>
               </div>
            </div>
            <div class="modal-footer border-top-0">
               <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
               <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
         </form>
      </div>
   </div>
</div>
