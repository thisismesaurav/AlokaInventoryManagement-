<div class="content-page">
     <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
                    <div>
                        <h4 class="mb-3">Product Type List</h4>
                    </div>
                    <a href="add-type.html" class="btn btn-primary add-list"><i class="las la-plus mr-3"></i>Add Type</a>
                </div>
            </div>
            <div class="col-lg-12">
                <div class="table-responsive rounded mb-3">
                <table class="data-table table mb-0 tbl-server-info">
                    <thead class="bg-white text-uppercase">
                        <tr class="ligth ligth-data">
                            <th>ID</th>
                            <th>Product Type</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody class="ligth-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
        <!-- Page end  -->
    </div>

    <!-- Edit Product Type Modal -->
    <div class="modal fade" id="edit-type-modal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-weight: 600;">Edit Product Type</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form action="" method="POST">
                    <input type="hidden" name="action_type" value="edit_type">
                    <input type="hidden" name="type_id" id="edit_type_id">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group mb-3">
                                    <label style="font-size: 13px; font-weight: 600; color: #475569;">Product Type *</label>
                                    <input type="text" name="type_name" id="edit_type_name" class="form-control" required placeholder="Enter Product Type">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.openEditTypeModal = function(typeId) {
                if (!window.currentIsAdmin) {
                    alert('This action is only allowed for administrator.');
                    return;
                }
                var typeObj = null;
                if (window.typeList) {
                    for (var i = 0; i < window.typeList.length; i++) {
                        if (window.typeList[i].id == typeId) {
                            typeObj = window.typeList[i];
                            break;
                        }
                    }
                }

                if (!typeObj) return;

                document.getElementById('edit_type_id').value = typeObj.id;
                document.getElementById('edit_type_name').value = typeObj.Type;

                $('#edit-type-modal').modal('show');
            };
        });
    </script>

</div>
