


<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
      <title>POS Dash | Responsive Bootstrap 4 Admin Dashboard Template</title>
      
      <!-- Favicon -->
      <link rel="shortcut icon" href="../assets/images/favicon.ico" />
      <link rel="stylesheet" href="../assets/css/backend-plugin.min.css">
      <link rel="stylesheet" href="../assets/css/backend.css?v=1.0.0">
      <link rel="stylesheet" href="../assets/vendor/@fortawesome/fontawesome-free/css/all.min.css">
      <link rel="stylesheet" href="../assets/vendor/line-awesome/dist/line-awesome/css/line-awesome.min.css">
      <link rel="stylesheet" href="../assets/vendor/remixicon/fonts/remixicon.css">  </head>
  <body class=" ">
    <!-- loader Start -->
    <div id="loading">
          <div id="loading-center">
          </div>
    </div>
    <!-- loader END -->
    
      <div class="wrapper">
      <section class="login-content">
         <div class="container">
            <div class="row align-items-center justify-content-center height-self-center">
               <div class="col-lg-8">
                  <div class="card auth-card">
                     <div class="card-body p-0">
                        <div class="d-flex align-items-center auth-content">
                           <div class="col-lg-7 align-self-center">
                              <div class="p-3">
                                 <h2 class="mb-2" style="font-weight: 700; color: #1e293b;">Sign In</h2>
                                 <p class="text-muted mb-4" style="font-size: 14px;">Login to stay connected.</p>
                                  <form method="POST" action="">
                                     <div class="row">
                                        <div class="col-lg-12">
                                           <div class="form-group mb-3">
                                              <label class="mb-2" style="font-size: 13px; font-weight: 600; color: #475569; display: block;">Email or Username</label>
                                              <input class="form-control" type="text" name="username" required autocomplete="username" placeholder="Enter your email or username" style="height: 45px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 10px 14px; font-size: 14px; color: #334155; width: 100%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); outline: none;">
                                           </div>
                                        </div>
                                        <div class="col-lg-12">
                                           <div class="form-group mb-4">
                                              <label class="mb-2" style="font-size: 13px; font-weight: 600; color: #475569; display: block;">Password</label>
                                              <div style="position: relative; width: 100%;">
                                                 <input class="form-control" type="password" name="password" id="signin_password" required autocomplete="current-password" placeholder="Enter your password" style="height: 45px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 10px 42px 10px 14px; font-size: 14px; color: #334155; width: 100%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); outline: none;">
                                                 <button type="button" id="toggle_signin_password" title="Show/hide password" tabindex="-1" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; font-size: 18px; display: flex; align-items: center; justify-content: center; outline: none; padding: 0; margin: 0; line-height: 1;">
                                                    <i class="ri-eye-off-line" id="toggle_signin_icon"></i>
                                                 </button>
                                              </div>
                                           </div>
                                        </div>
                                        <div class="col-lg-12 mb-4">
                                           <div class="custom-control custom-checkbox d-flex align-items-center">
                                              <input type="checkbox" class="custom-control-input" id="customCheck1" name="remember" value="1">
                                              <label class="custom-control-label control-label-1" for="customCheck1" style="font-size: 14px; color: #64748b; cursor: pointer; user-select: none;">Remember Me</label>
                                           </div>
                                        </div>
                                     </div>
                                     <button type="submit" class="btn btn-primary" style="height: 45px; border-radius: 8px; font-size: 14px; font-weight: 600; width: 100%; background: #32BDEA; border: none; color: #fff; box-shadow: 0 4px 6px -1px rgba(50, 189, 234, 0.2), 0 2px 4px -1px rgba(50, 189, 234, 0.1); cursor: pointer; transition: all 0.2s ease-in-out;">Sign In</button>
                                  </form>
                                  <script>
                                     document.getElementById('toggle_signin_password').addEventListener('click', function() {
                                        var pwInput = document.getElementById('signin_password');
                                        var icon = document.getElementById('toggle_signin_icon');
                                        if (pwInput.type === 'password') {
                                           pwInput.type = 'text';
                                           icon.className = 'ri-eye-line';
                                        } else {
                                           pwInput.type = 'password';
                                           icon.className = 'ri-eye-off-line';
                                        }
                                     });
                                  </script>
                              </div>
                           </div>
                           <div class="col-lg-5 content-right">
                              <img src="../assets/images/login/01.png" class="img-fluid image-right" alt="">
                           </div>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </section>
      </div>
    
    <!-- Backend Bundle JavaScript -->
    <script src="../assets/js/backend-bundle.min.js"></script>
    
    <!-- Table Treeview JavaScript -->
    <script src="../assets/js/table-treeview.js"></script>
    
    <!-- Chart Custom JavaScript -->
    <script src="../assets/js/customizer.js"></script>
    
    <!-- Chart Custom JavaScript -->
    <script async src="../assets/js/chart-custom.js"></script>
    
    <!-- app JavaScript -->
    <script src="../assets/js/app.js"></script>
  </body>
</html>
